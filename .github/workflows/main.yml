name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: git fetch origin

      - name: Criar branch de publicação a partir da main
        run: |
          git checkout -B build/github-pages origin/main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vite build --outDir docs

      - name: Commitar build
        run: |
          git add docs
          git commit -m "Deploy GitHub Pages" || echo "Sem alterações"

      - name: Publicar
        run: |
          git push --force-with-lease origin build/github-pages
