name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Buscar todas as branches
        run: git fetch origin

      - name: Checkout da branch de publicação
        run: |
          git checkout build/github-pages || git checkout -b build/github-pages origin/build/github-pages

      - name: Merge da main
        run: |
          git merge origin/main --no-edit

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build
        run: npx vite build --outDir docs

      - name: Commitar alterações
        run: |
          git add docs
          git commit -m "Deploy GitHub Pages" || echo "Nenhuma alteração"

      - name: Publicar
        run: git push origin build/github-pages
